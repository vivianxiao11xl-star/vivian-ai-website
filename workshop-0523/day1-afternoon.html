<style>
  :root {

    --brand-gold: #FFC857;
    --text-primary: #ffffff;
    --text-muted: rgba(255,255,255,0.78);
    --text-subtle: rgba(255,255,255,0.55);
    --text-dim: rgba(255,255,255,0.38);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body.staticrypt-body { height: 100%; }

    color: var(--text-muted);
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    background: #fafaf9;
    background-image:

      radial-gradient(600px 300px at 85% 50%, rgba(255,200,87,0.06), transparent 60%),
      linear-gradient(180deg, var(--bg-0) 0%, var(--bg-1) 50%, var(--bg-0) 100%);
    min-height: 100vh;
  }

  .staticrypt-content {
    background: transparent;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
    font-family: inherit;
  }
  .staticrypt-content.hidden { display: none !important; }

  .staticrypt-page {
    width: 100%;
    max-width: 460px;
    position: relative;
  }

  .brand-badge {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 4px;
    color: var(--brand-gold);
    text-transform: uppercase;
    padding: 7px 20px;
    border: 1px solid rgba(255,200,87,0.3);
    border-radius: 24px;
    background: rgba(255,200,87,0.04);
    margin-bottom: 32px;
  }
  .brand-badge::before {
    content: '';
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--brand-gold);
    box-shadow: 0 0 12px rgba(255,200,87,0.6);
  }

  .staticrypt-form {
    background: rgba(255,255,255,0.025);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 24px;
    padding: 52px 44px;
    text-align: center;
    box-shadow: 0 24px 60px rgba(0,0,0,0.4);
    max-width: 460px;
    margin: 0;
    position: static;
  }

  .staticrypt-instructions {
    margin-bottom: 36px;
    margin-top: 0;
  }
  .staticrypt-title {
    font-size: 22px !important;
    font-weight: 900;
    color: var(--text-primary);
    letter-spacing: -0.3px;
    line-height: 1.35;
    margin-bottom: 12px;
    background: linear-gradient(135deg, #ffffff 30%, var(--brand-blue-soft) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .staticrypt-instructions p:not(.staticrypt-title) {
    font-size: 13.5px;
    color: var(--text-subtle);
    line-height: 1.65;
    letter-spacing: 0.5px;
  }
  .staticrypt-hr { display: none; }

  .staticrypt-password-container {
    position: relative;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 14px;
    margin: 0 0 16px;
    width: 100%;
    box-sizing: border-box;
    outline: 0;
    transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
  }
  .staticrypt-password-container:focus-within {
    border-color: var(--brand-blue-soft);
    background: rgba(41,151,255,0.06);
    box-shadow: 0 0 0 3px rgba(41,151,255,0.12);
  }
  .staticrypt-form input[type="password"],
  .staticrypt-form input[type="text"] {
    background: transparent !important;
    border: 0 !important;
    color: var(--text-primary) !important;
    font-family: inherit;
    font-size: 15px !important;
    padding: 16px 50px 16px 18px !important;
    width: 100%;
    outline: 0;
    text-align: center;
    letter-spacing: 2px;
  }
  .staticrypt-form input::placeholder {
    color: rgba(255,255,255,0.32);
    letter-spacing: 3px;
  }

  .staticrypt-toggle-password-visibility {
    cursor: pointer;
    height: 18px;
    width: 18px;
    opacity: 0.45;
    padding: 16px;
    position: absolute;
    right: 0;
    top: 50%;
    transform: translateY(-50%);
    filter: invert(1);
    transition: opacity 0.2s;
  }
  .staticrypt-toggle-password-visibility:hover { opacity: 0.75; }

  .staticrypt-form .staticrypt-decrypt-button {
    background: linear-gradient(135deg, var(--brand-blue) 0%, var(--brand-blue-soft) 100%) !important;
    text-transform: none !important;
    width: 100%;
    border: 0;
    padding: 16px 20px !important;
    color: #ffffff;
    font-size: 15px !important;
    font-weight: 700;
    letter-spacing: 6px;
    cursor: pointer;
    border-radius: 14px !important;
    transition: transform 0.15s, box-shadow 0.2s, filter 0.15s;
    font-family: inherit;
  }
  .staticrypt-form .staticrypt-decrypt-button:hover,
  .staticrypt-form .staticrypt-decrypt-button:focus {
    filter: brightness(110%);
    transform: translateY(-1px);
    box-shadow: 0 10px 28px rgba(0,113,227,0.35);
  }
  .staticrypt-form .staticrypt-decrypt-button:active {
    transform: translateY(0);
  }

  label.staticrypt-remember {
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 20px 0 0;
    color: var(--text-subtle);
    font-size: 13px;
  }
  .staticrypt-remember input[type="checkbox"] {
    transform: scale(1.15);
    margin-right: 10px;
    accent-color: var(--brand-blue-soft);
  }
  label.staticrypt-remember { display: none !important; }

  .footer-brand {
    margin-top: 36px;
    text-align: center;
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 5px;
    text-transform: uppercase;
  }

  .staticrypt-spinner-container {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .staticrypt-spinner {
    display: inline-block;
    width: 2.5rem;
    height: 2.5rem;
    border: 0.2em solid rgba(41,151,255,0.2);
    border-right-color: var(--brand-blue-soft);
    border-radius: 50%;
    animation: sc-spin 0.75s linear infinite;
  }
  @keyframes sc-spin { 100% { transform: rotate(360deg); } }

  .hidden { display: none !important; }

  @media (max-width: 480px) {
    .staticrypt-form { padding: 40px 28px; }
    .staticrypt-title { font-size: 19px !important; }
  }
</style>
</head>
