    letter-spacing: 2px;

/* ============ 画图 ============ */
const svg = document.getElementById("canvas");
const linkLayer = document.getElementById("layer-links");
const centerLayer = document.getElementById("layer-center");
const nodeLayer = document.getElementById("layer-nodes");

let W = window.innerWidth, H = window.innerHeight;
function resize() {
  W = window.innerWidth;
  H = window.innerHeight;
  svg.setAttribute("viewBox", `0 0 ${W} ${H}`);
  draw();
}
window.addEventListener("resize", resize);

function draw() {
  linkLayer.innerHTML = "";
  centerLayer.innerHTML = "";
  nodeLayer.innerHTML = "";

  const cx = W / 2;
  const cy = H / 2 + 10;
  const R = Math.min(W, H) * 0.36;

  // place each member around circle
  const positions = {};
  const n = members.length;
  members.forEach((m, i) => {
    const angle = (i / n) * Math.PI * 2 - Math.PI / 2;
    const x = cx + R * Math.cos(angle);
    const y = cy + R * Math.sin(angle);
    positions[m.id] = { x, y };
  });

  // center decorative rings
  for (let r = 50; r <= 100; r += 20) {
    const c = document.createElementNS("http://www.w3.org/2000/svg", "circle");
    c.setAttribute("cx", cx);
    c.setAttribute("cy", cy);
    c.setAttribute("r", r);
    c.setAttribute("class", "center-circle");
    centerLayer.appendChild(c);
  }
  // center filled glow
  const cg = document.createElementNS("http://www.w3.org/2000/svg", "circle");
  cg.setAttribute("cx", cx);
  cg.setAttribute("cy", cy);
  cg.setAttribute("r", 110);
  cg.setAttribute("fill", "url(#centerGrad)");
  centerLayer.appendChild(cg);
  // center labels
  const ct1 = document.createElementNS("http://www.w3.org/2000/svg", "text");
  ct1.setAttribute("x", cx);
  ct1.setAttribute("y", cy - 6);
  ct1.setAttribute("class", "center-text-main");
  ct1.textContent = "COHORT 02";
  centerLayer.appendChild(ct1);
  const ct2 = document.createElementNS("http://www.w3.org/2000/svg", "text");
  ct2.setAttribute("x", cx);
  ct2.setAttribute("y", cy + 18);
  ct2.setAttribute("class", "center-text-sub");
  ct2.textContent = "0 5 / 2 3 — 0 5 / 2 4";
  centerLayer.appendChild(ct2);

  // draw links (curved through center)
  links.forEach((l, idx) => {
    const pa = positions[l.a];
    const pb = positions[l.b];
    if (!pa || !pb) return;
    // gentle quadratic curve toward center
    const mx = (pa.x + pb.x) / 2;
    const my = (pa.y + pb.y) / 2;
    const dx = mx - cx;
    const dy = my - cy;
    const dist = Math.sqrt(dx * dx + dy * dy);
    const pullFactor = dist > 0 ? Math.max(0, 1 - 200 / dist) * 0.7 : 0;
    const qx = mx - dx * pullFactor;
    const qy = my - dy * pullFactor;
    const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
    path.setAttribute("d", `M ${pa.x},${pa.y} Q ${qx},${qy} ${pb.x},${pb.y}`);
    path.setAttribute("class", "link");
    path.dataset.a = l.a;
    path.dataset.b = l.b;
    linkLayer.appendChild(path);
  });

  // draw nodes
  members.forEach(m => {
    const { x, y } = positions[m.id];
    const g = document.createElementNS("http://www.w3.org/2000/svg", "g");
    g.setAttribute("class", "node-group");
    g.dataset.id = m.id;
    g.setAttribute("transform", `translate(${x}, ${y})`);

    // 根据节点数自适应大小
    const nodeR = members.length > 9 ? 32 : 38;
    const circle = document.createElementNS("http://www.w3.org/2000/svg", "circle");
    circle.setAttribute("r", nodeR);
    circle.setAttribute("class", "node-circle");
    g.appendChild(circle);

    // 透明命中区域，覆盖节点 + 下方文字（点击更容易）
    const hit = document.createElementNS("http://www.w3.org/2000/svg", "rect");
    hit.setAttribute("class", "node-hit");
    hit.setAttribute("x", -nodeR - 8);
    hit.setAttribute("y", -nodeR - 8);
    hit.setAttribute("width", (nodeR + 8) * 2);
    hit.setAttribute("height", nodeR * 2 + 65);
    g.appendChild(hit);

    const letter = document.createElementNS("http://www.w3.org/2000/svg", "text");
    letter.setAttribute("class", "node-letter");
    letter.setAttribute("y", 0);
    // 多字符（如 Celine、Heidi）字体缩小
    if (m.short.length > 1) {
      letter.setAttribute("style", "font-size: 14px; letter-spacing: 0.5px;");
    }
    letter.textContent = m.short;
    g.appendChild(letter);

    // name below
    const name = document.createElementNS("http://www.w3.org/2000/svg", "text");
    name.setAttribute("class", "node-name");
    name.setAttribute("y", nodeR + 22);
    name.textContent = m.name;
    g.appendChild(name);

    const company = document.createElementNS("http://www.w3.org/2000/svg", "text");
    company.setAttribute("class", "node-company");
    company.setAttribute("y", nodeR + 40);
    company.textContent = m.company;
    g.appendChild(company);

    // events
    g.addEventListener("mouseenter", (e) => {
      activate(m.id);
      showTooltip(m, x, y, cx, cy);
    });
    g.addEventListener("mouseleave", () => {
      deactivate();
      hideTooltip();
    });
    g.addEventListener("click", (e) => {
      e.stopPropagation();
      openDetail(m.id);
    });

    nodeLayer.appendChild(g);
  });
}

function activate(id) {
  document.body.classList.add("dim-mode");
  // active node
  document.querySelectorAll(".node-group").forEach(g => {
    g.classList.toggle("active", g.dataset.id === id);
  });
  // related nodes (connected via links)
  const related = new Set();
  document.querySelectorAll(".link").forEach(l => {
    const isRelated = l.dataset.a === id || l.dataset.b === id;
    l.classList.toggle("active", isRelated);
    if (isRelated) {
      related.add(l.dataset.a);
      related.add(l.dataset.b);
    }
  });
  document.querySelectorAll(".node-group").forEach(g => {
    if (g.dataset.id !== id && related.has(g.dataset.id)) {
      g.classList.add("related");
    }
  });
}

function deactivate() {
  document.body.classList.remove("dim-mode");
  document.querySelectorAll(".node-group").forEach(g => {
    g.classList.remove("active", "related");
  });
  document.querySelectorAll(".link").forEach(l => l.classList.remove("active"));
}

function showTooltip(m, nx, ny, cx, cy) {
  const tt = document.getElementById("tooltip");
  tt.innerHTML = `
    <div class="tt-num">NO. ${m.num} / ${String(members.length).padStart(2, "0")} · ${m.mbti}</div>
    <div class="tt-name">${m.name}${m.enName ? " · " + m.enName : ""}</div>
    <div class="tt-meta">${m.company} · ${m.role}</div>
    <div class="tt-label">想用 AI 解决</div>
    <div class="tt-want">${m.want}</div>
    <div class="tt-label">现场金句</div>
    <div class="tt-quote">${m.quote}</div>
    <div class="tt-more">点击查看完整画像 →</div>
  `;
  // 位置：节点向中心反方向偏移，避免遮挡节点；并保证在屏幕内
  const ttW = 320;
  const ttH = 280;
  let dx = nx - cx;
  let dy = ny - cy;
  const len = Math.sqrt(dx * dx + dy * dy) || 1;
  dx /= len; dy /= len;
  let tx = nx + dx * 90 - ttW / 2;
  let ty = ny + dy * 90 - ttH / 2;
  // clamp to viewport
  tx = Math.max(16, Math.min(window.innerWidth - ttW - 16, tx));
  ty = Math.max(16, Math.min(window.innerHeight - ttH - 16, ty));
  tt.style.left = tx + "px";
  tt.style.top = ty + "px";
  tt.classList.add("show");
}

function hideTooltip() {
  document.getElementById("tooltip").classList.remove("show");
}

function openDetail(id) {
  const m = members.find(x => x.id === id);
  if (!m) return;
  const tagsHtml = m.tags.map(t => `<span class="tag">${t}</span>`).join("");
  document.getElementById("detail-content").innerHTML = `
    <div class="num">NO. ${m.num} / ${String(members.length).padStart(2, "0")}</div>
    <h2>${m.name}${m.enName ? ` · ${m.enName}` : ""}</h2>
    <div class="company">${m.company} · ${m.role} · ${m.mbti}</div>
    <div class="tags">${tagsHtml}</div>
    <h3>背景</h3>
    <p>${m.edu}</p>
    <h3>代表战绩</h3>
    <p>${m.war}</p>
    <h3>想用 AI 解决</h3>
    <p>${m.want}</p>
    <h3>现场金句</h3>
    <blockquote>${m.quote}</blockquote>
  `;
  document.getElementById("detail").classList.add("open");
}

function closeDetail() {
  document.getElementById("detail").classList.remove("open");
}

document.addEventListener("click", (e) => {
  // click outside any node closes
  if (!e.target.closest(".node-group") && !e.target.closest("#detail")) {
    closeDetail();
  }
});

for (let i = 0; i < 120; i++) {
  const s = document.createElement("div");

  s.style.top = Math.random() * 100 + "%";
  s.style.animationDelay = (Math.random() * 4) + "s";
  s.style.animationDuration = (3 + Math.random() * 3) + "s";
  const size = Math.random() < 0.85 ? 1 : 2;
  s.style.width = size + "px";
  s.style.height = size + "px";
  starField.appendChild(s);
}
