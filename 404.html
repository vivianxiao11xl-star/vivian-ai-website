<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<script>
  // GitHub Pages SPA redirect
  const path = window.location.pathname;
  if (path === '/signal' || path === '/signal/') {
    window.location.replace('/signal.html');
  } else {
    window.location.replace('/');
  }
</script>
</head>
<body></body>
</html>
