<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 重塑流程投票 · 0625 一号位 AI 工作坊</title>
<style>
  :root { --bg:#0a0a0f; --fg:#f5f5f7; --muted:#8a8a96; --gold:#f5c451; }
  * { box-sizing: border-box; }
  html,body { margin:0; width:100%; height:100%; overflow:hidden; background:var(--bg); color:var(--fg); font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Helvetica Neue',sans-serif; }
  body { background: radial-gradient(circle at 50% 18%, rgba(245,196,81,.18), transparent 28%), radial-gradient(ellipse at top, #1a1a2e 0%, var(--bg) 62%); }
  .stage { width:100vw; height:100vh; display:grid; grid-template-columns: 1.05fr .95fr; gap:4vw; align-items:center; padding:6vh 7vw; }
  .eyebrow { color:var(--gold); font-size:15px; font-weight:900; letter-spacing:7px; margin-bottom:22px; }
  h1 { margin:0; font-size:clamp(58px,7vw,112px); line-height:.98; letter-spacing:-4px; font-weight:950; }
  .gold { color:var(--gold); }
  .sub { margin-top:30px; color:rgba(245,245,247,.78); font-size:clamp(22px,2.4vw,36px); line-height:1.45; font-weight:750; }
  .rule { margin-top:28px; color:var(--muted); font-size:clamp(16px,1.35vw,22px); line-height:1.8; }
  .qr-card { justify-self:center; width:min(40vw,560px); border-radius:38px; padding:34px; background:#fff; box-shadow:0 40px 120px rgba(0,0,0,.48), 0 0 90px rgba(245,196,81,.18); }
  .qr-card img { display:block; width:100%; height:auto; border-radius:18px; image-rendering:auto; }
  .url { margin-top:22px; text-align:center; color:rgba(245,245,247,.72); font-size:clamp(16px,1.35vw,22px); font-weight:750; letter-spacing:.5px; }
  .hint { position:fixed; left:7vw; bottom:5vh; color:rgba(245,245,247,.42); font-size:15px; letter-spacing:1px; }
  @media (max-width: 900px) { .stage { grid-template-columns:1fr; text-align:center; padding:5vh 6vw; } .qr-card{width:min(76vw,460px);} .hint{display:none;} }
</style>
</head>
<body>
  <main class="stage">
    <section>
      <div class="eyebrow">DAY2 · AI 重塑业务流程挑战</div>
      <h1>扫码<br><span class="gold">投出你的一票</span></h1>
      <div class="sub">1 小时用 AI 重塑业务流程<br>A / B / C 三组，选择你所在组后投给其他组</div>
      <div class="rule">每人 1 票 · 不能投自己组 · 提交后等待现场亮票</div>
    </section>
    <section>
      <div class="qr-card"><img src="qrcode-vote.png" alt="扫码进入现场投票"></div>
      <div class="url">vivianai.cn/workshop-0625/vote.html</div>
    </section>
  </main>
  <div class="hint">投屏用：AI 重塑流程挑战赛扫码投票页</div>
</body>
</html>
