<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>现场亮票 · 0625 一号位 AI 工作坊</title>
<style>
  :root {
    --bg: #0a0a0f;
    --fg: #f5f5f7;
    --muted: #6a6a76;
    --gold: #f5c451;
    --team-a: #6366f1;
    --team-a-2: #4338ca;
    --team-b: #10b981;
    --team-b-2: #047857;
    --team-c: #ec4899;
    --team-c-2: #be185d;
      }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100vh; overflow: hidden; background: var(--bg); color: var(--fg); font-family: -apple-system, 'PingFang SC', 'Helvetica Neue', sans-serif; -webkit-font-smoothing: antialiased; }
  body { background: radial-gradient(ellipse at top, #1a1a2e 0%, var(--bg) 60%); }
  .stage { height: 100vh; display: flex; flex-direction: column; padding: 4vh 5vw; }
  .head { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 3vh; gap: 24px; }
  .eyebrow { color: var(--gold); font-size: 13px; letter-spacing: 5px; font-weight: 800; text-transform: uppercase; }
  h1 { font-size: 52px; font-weight: 950; margin: 6px 0 0; letter-spacing: -1.2px; }
  .meta { text-align: right; color: var(--muted); font-size: 14px; min-width: 150px; }
  .meta .total { color: var(--fg); font-size: 40px; font-weight: 900; line-height: 1; margin-top: 4px; }
  .meta .total .num { color: var(--gold); }
  .bars { flex: 1; display: grid; grid-template-columns: repeat(3, 1fr); gap: 3vw; align-items: end; padding: 0 1vw 3vh; }
  .bar-col { display: flex; flex-direction: column; align-items: center; height: 100%; justify-content: flex-end; gap: 1.6vh; }
  .bar-wrap { width: 100%; max-width: 190px; flex: 1; display: flex; flex-direction: column; justify-content: flex-end; }
  .bar {
    width: 100%; border-radius: 22px 22px 0 0;
    background: linear-gradient(180deg, rgba(255,255,255,0.06), rgba(255,255,255,0.02));
    transition: height 1.1s cubic-bezier(0.22, 1, 0.36, 1);
    position: relative; overflow: hidden; min-height: 14px;
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.08);
  }
  .bar.A { background: linear-gradient(180deg, var(--team-a), var(--team-a-2)); }
  .badge.A { background: linear-gradient(135deg, var(--team-a), var(--team-a-2)); }
  .bar.B { background: linear-gradient(180deg, var(--team-b), var(--team-b-2)); }
  .badge.B { background: linear-gradient(135deg, var(--team-b), var(--team-b-2)); }
  .bar.C { background: linear-gradient(180deg, var(--team-c), var(--team-c-2)); }
  .badge.C { background: linear-gradient(135deg, var(--team-c), var(--team-c-2)); }
  .bar.leader { box-shadow: 0 0 60px rgba(245,196,81,0.52), inset 0 1px 0 rgba(255,255,255,0.3); }
  .bar.leader::before { content: ''; position: absolute; inset: 0; background: linear-gradient(180deg, rgba(245,196,81,.28), transparent 52%); }
  .count { font-size: 72px; font-weight: 950; line-height: 1; margin-top: -8px; margin-bottom: 2px; letter-spacing: -2px; transition: color .3s, transform .3s; }
  .leader-tag .count { color: var(--gold); transform: scale(1.05); }
  .team-info { text-align: center; }
  .badge { width: 66px; height: 66px; border-radius: 18px; margin: 0 auto 9px; display: flex; align-items: center; justify-content: center; font-size: 34px; font-weight: 950; color: #fff; }
  .team-label { font-size: 20px; font-weight: 850; color: var(--fg); letter-spacing: 1px; }
  .team-title { margin-top: 4px; color: var(--muted); font-size: 14px; font-weight: 600; white-space: nowrap; }
  .leader-tag .team-label, .leader-tag .team-title { color: var(--gold); }
  .crown { font-size: 34px; line-height: 1; height: 34px; opacity: 0; transition: opacity .4s; margin-bottom: 4px; }
  .leader-tag .crown { opacity: 1; }
  .foot { text-align: center; color: var(--muted); font-size: 13px; letter-spacing: 1px; padding-bottom: 1vh; }
  .foot .reveal-btn { background: var(--gold); color: #0a0a0f; border: none; padding: 10px 24px; border-radius: 999px; font-size: 13px; font-weight: 800; cursor: pointer; margin-left: 16px; font-family: inherit; transition: all .2s; }
  .foot .reveal-btn:hover { transform: translateY(-1px); box-shadow: 0 8px 24px rgba(245,196,81,.3); }
  .foot .reveal-btn.revealed { background: rgba(255,255,255,.08); color: var(--muted); }
  body.hidden .count, body.hidden .bar { visibility: hidden; }
  body.hidden .bar-wrap::after { content: '⋯'; font-size: 74px; color: var(--muted); display: block; text-align: center; line-height: 100%; padding-bottom: 20px; }
  @media (max-width: 900px) {
    h1 { font-size: 30px; }
    .bars { gap: 2vw; }
    .count { font-size: 44px; }
    .badge { width: 50px; height: 50px; font-size: 26px; }
    .team-title { font-size: 11px; white-space: normal; }
  }
</style>
</head>
<body class="hidden">
<div class="stage">
  <div class="head">
    <div>
      <div class="eyebrow">0625 · 现场亮票</div>
      <h1>谁是今天最棒的团队？</h1>
    </div>
    <div class="meta">
      已投票
      <div class="total"><span class="num" id="total">0</span></div>
    </div>
  </div>

  <div class="bars" id="bars">
    <div class="bar-col" data-team="A">
      <div class="bar-wrap"><div class="bar A" style="height:0%"></div></div>
      <div class="count" id="count-A">0</div>
      <div class="team-info">
        <div class="crown">👑</div>
        <div class="badge A">A</div>
        <div class="team-label">A 组</div>
        <div class="team-title">未来门店 AI 教练</div>
      </div>
    </div>
    <div class="bar-col" data-team="B">
      <div class="bar-wrap"><div class="bar B" style="height:0%"></div></div>
      <div class="count" id="count-B">0</div>
      <div class="team-info">
        <div class="crown">👑</div>
        <div class="badge B">B</div>
        <div class="team-label">B 组</div>
        <div class="team-title">AI 经营驾驶舱</div>
      </div>
    </div>
    <div class="bar-col" data-team="C">
      <div class="bar-wrap"><div class="bar C" style="height:0%"></div></div>
      <div class="count" id="count-C">0</div>
      <div class="team-info">
        <div class="crown">👑</div>
        <div class="badge C">C</div>
        <div class="team-label">C 组</div>
        <div class="team-title">AI 组织复制官</div>
      </div>
    </div>
  </div>

  <div class="foot">
    自动刷新中 · 每 1.5 秒更新
    <button class="reveal-btn" id="reveal-btn" onclick="toggleReveal()">亮票！</button>
  </div>
</div>

<script>
  const API = 'https://abacus.jasoncameron.dev';
  const NS = 'vivian-ws-0625-day1-vote-v3';
  const TEAMS = ['A','B','C'];
  let counts = Object.fromEntries(TEAMS.map(t => [t, 0]));
  let revealed = false;
  function $(id) { return document.getElementById(id); }
  async function fetchAll() {
    try {
      const results = await Promise.all(TEAMS.map(t =>
        fetch(`${API}/get/${NS}/team-${t.toLowerCase()}`, { cache: 'no-store' }).then(r => r.json()).catch(() => ({ value: 0 }))
      ));
      results.forEach((d, i) => { counts[TEAMS[i]] = d.value || 0; });
      render();
    } catch (e) { console.warn('fetch failed', e); }
  }
  function render() {
    const total = TEAMS.reduce((sum, t) => sum + (counts[t] || 0), 0);
    $('total').textContent = total;
    const max = Math.max(...TEAMS.map(t => counts[t] || 0), 1);
    const leaders = total > 0 ? TEAMS.filter(t => counts[t] === max && counts[t] > 0) : [];
    TEAMS.forEach(t => {
      const col = document.querySelector(`.bar-col[data-team="${t}"]`);
      const bar = col.querySelector('.bar');
      const cnt = $(`count-${t}`);
      const pct = Math.max(4, ((counts[t] || 0) / max) * 100);
      bar.style.height = pct + '%';
      cnt.textContent = counts[t] || 0;
      const isLeader = revealed && leaders.includes(t);
      col.classList.toggle('leader-tag', isLeader);
      bar.classList.toggle('leader', isLeader);
    });
  }
  function toggleReveal() {
    revealed = !revealed;
    document.body.classList.toggle('hidden', !revealed);
    const btn = $('reveal-btn');
    btn.textContent = revealed ? '隐藏' : '亮票！';
    btn.classList.toggle('revealed', revealed);
    render();
  }
  fetchAll();
  setInterval(fetchAll, 1500);
</script>
</body>
</html>
