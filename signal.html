// ===== 工具函数：解析日期用于排序 =====
function parseDate(d) {
  // 处理 "2026-03-17" 或 "2026-03" 或 "2026-01" 格式
  const parts = d.split('-');
  return new Date(parts[0], (parts[1]||1)-1, parts[2]||15);
}

// ===== 创建可展开卡片 =====
function createCard(s, i, isDark) {
  const el = document.createElement('div');
  el.className = `card fade-in`;
  el.style.animationDelay = `${i * 0.05}s`;
  el.innerHTML = `
    <div class="card-tag ${s.category}">${s.categoryLabel}</div>
    <div class="card-summary">${s.summary}</div>
    <div class="card-original">${s.titleOriginal}</div>
    <div class="card-why">${s.why}</div>
    <div class="card-meta">
      <span><span class="card-source">${s.source}</span> · ${s.date}</span>
      <span class="card-expand-hint">点击展开</span>
      <a href="${s.url}" target="_blank" rel="noopener" class="card-read-link" onclick="event.stopPropagation()">阅读原文 ›</a>
    </div>
  `;
  el.addEventListener('click', (e) => {
    if (e.target.tagName === 'A') return;
    el.classList.toggle('expanded');
  });
  return el;
}

// ===== 渲染重磅推荐 =====
const picksGrid = document.getElementById('picks-grid');
const featured = signals.filter(s => s.featured);

featured.forEach((s, i) => {
  const card = document.createElement('div');
  card.className = 'pick-card fade-in';
  card.style.animationDelay = `${i * 0.08}s`;
  card.innerHTML = `
    <div class="pick-badge">✦ 重磅</div>
    <div class="pick-tag">${s.categoryLabel}</div>
    <div class="pick-summary">${s.summary}</div>
    <div class="pick-original">${s.titleOriginal}</div>
    <div class="pick-why">${s.why}</div>
    <div class="pick-meta">
      <span><span class="pick-source">${s.source}</span> · ${s.date}</span>
      <a href="${s.url}" target="_blank" rel="noopener" class="pick-read-link">阅读原文 ›</a>
    </div>
  `;
  picksGrid.appendChild(card);
});

// ===== 渲染最近更新（按日期排序，取最新 8 条非 featured） =====
const recentGrid = document.getElementById('recent-grid');
const nonFeatured = signals.filter(s => !s.featured);
const recentItems = [...nonFeatured].sort((a, b) => parseDate(b.date) - parseDate(a.date)).slice(0, 8);

recentItems.forEach((s, i) => {
  recentGrid.appendChild(createCard(s, i));
});

// ===== 渲染分类浏览 =====
const catTabs = document.getElementById('cat-tabs');
const catGrid = document.getElementById('cat-grid');
const showMoreWrap = document.getElementById('show-more-wrap');
const showMoreBtn = document.getElementById('show-more-btn');
let currentCat = 'strategy';
let showAll = false;
const INITIAL_COUNT = 4;

categories.forEach((cat, i) => {
  const count = nonFeatured.filter(s => s.category === cat.id).length;
  const btn = document.createElement('button');
  btn.className = `cat-tab${i === 0 ? ' active' : ''}`;
  btn.dataset.cat = cat.id;
  btn.innerHTML = `${cat.label}<span class="tab-count">${count}</span>`;
  btn.addEventListener('click', () => {
    document.querySelectorAll('.cat-tab').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentCat = cat.id;
    showAll = false;
    renderCatCards();
  });
  catTabs.appendChild(btn);
});

function renderCatCards() {
  const items = nonFeatured.filter(s => s.category === currentCat)
    .sort((a, b) => parseDate(b.date) - parseDate(a.date));
  const display = showAll ? items : items.slice(0, INITIAL_COUNT);

  catGrid.innerHTML = '';
  display.forEach((s, i) => {
    catGrid.appendChild(createCard(s, i));
  });

  if (items.length > INITIAL_COUNT && !showAll) {
    showMoreWrap.classList.add('visible');
    showMoreBtn.textContent = `查看全部 ${items.length} 条`;
  } else {
    showMoreWrap.classList.remove('visible');
  }
}

showMoreBtn.addEventListener('click', () => {
  showAll = true;
  renderCatCards();
});

// 展开全部
document.getElementById('toggle-all').addEventListener('click', function() {
  showAll = true;
  renderCatCards();
  this.style.display = 'none';
});

// ===== Hero meta =====
const total = signals.length;
document.getElementById('hero-meta').textContent = `${total} 篇精选 · 6 个分类 · 最近更新：2026.03.24`;

// ===== 初始化 =====
renderCatCards();
</script>
