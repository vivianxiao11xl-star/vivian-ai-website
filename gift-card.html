<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>礼物卡 · 录音 Skill · A Gift From Vivian</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Noto+Sans+SC:wght@300;400;500;700&family=Noto+Serif+SC:wght@400;600;700&display=swap');

  @page {
    size: 148mm 105mm;
    margin: 0;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Noto Sans SC', 'Inter', -apple-system, 'PingFang SC', sans-serif;
    -webkit-font-smoothing: antialiased;
    background: #e8e8ed;
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 24px;
    padding: 30px;
  }

  /* ========== 工具栏 ========== */
  .toolbar {
    position: fixed;
    top: 0; left: 0; right: 0;
    background: #1d1d1f;
    color: #f5f5f7;
    padding: 14px 32px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    z-index: 100;
    font-size: 14px;
  }
  .toolbar .badge {
    display: inline-block;
    background: #B5883B;
    color: #fff;
    font-size: 10px;
    padding: 3px 10px;
    border-radius: 10px;
    margin-left: 12px;
    font-weight: 500;
  }
  .toolbar .sub {
    opacity: 0.4;
    font-size: 12px;
    margin-left: 8px;
  }
  .toolbar button {
    background: #0071e3;
    color: #fff;
    border: none;
    padding: 8px 24px;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
  }

  /* ========== 卡片通用 ========== */
  .gift-card {
    width: 148mm;
    height: 105mm;
    background: #F5F5F7;
    page-break-after: always;
    position: relative;
    overflow: hidden;
    box-shadow: 0 1px 8px rgba(0,0,0,0.06);
  }
  .gift-card:last-child { page-break-after: auto; }

  /* ============================= */
  /*           正面 FRONT           */
  /* ============================= */
  .card-front {
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    padding: 14px 22px 12px;
    position: relative;
  }

  /* 顶部金色眉标 */
  .gift-tag {
    font-family: 'Inter', sans-serif;
    font-size: 10px;
    color: #B5883B;
    letter-spacing: 3.5px;
    font-weight: 500;
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  /* 致：名字 */
  .gift-to {
    font-size: 12px;
    color: #86868b;
    letter-spacing: 2px;
    margin-bottom: 3px;
  }
  .gift-name {
    font-family: 'Noto Serif SC', serif;
    font-size: 30px;
    font-weight: 700;
    color: #1d1d1f;
    letter-spacing: 5px;
    margin-bottom: 18px;
    line-height: 1.2;
  }

  /* 主标语 */
  .gift-headline {
    font-family: 'Noto Serif SC', serif;
    font-size: 27px;
    font-weight: 700;
    color: #1d1d1f;
    letter-spacing: 2.5px;
    line-height: 1.35;
    margin-bottom: 10px;
  }

  /* 副标语 */
  .gift-sub {
    font-size: 14px;
    color: #6e6e73;
    line-height: 1.75;
    letter-spacing: 1.2px;
  }

  /* 底部 QR 区 */
  .gift-qr-area {
    margin-top: auto;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
  }

  .gift-qr-left {
    display: flex;
    flex-direction: column;
    gap: 3px;
  }
  .gift-qr-label {
    font-size: 11px;
    color: #0071e3;
    letter-spacing: 1.5px;
    font-weight: 500;
  }
  .gift-qr-url {
    font-family: 'Inter', sans-serif;
    font-size: 10px;
    color: #86868b;
    letter-spacing: 1px;
  }

  .gift-qr-img {
    width: 30mm;
    height: 30mm;
    background: #fff;
    padding: 2mm;
    border-radius: 4px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
  }
  .gift-qr-img img {
    width: 100%;
    height: 100%;
    display: block;
  }

  /* ============================= */
  /*           反面 BACK            */
  /* ============================= */
  .card-back {
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px 28px;
    text-align: center;
    background: #F5F5F7;
  }

  .back-quote {
    font-family: 'Noto Serif SC', serif;
    font-size: 22px;
    font-weight: 600;
    color: #1d1d1f;
    line-height: 1.95;
    letter-spacing: 2px;
    max-width: 380px;
    margin-bottom: 18px;
  }

  .back-author {
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    color: #86868b;
    letter-spacing: 2.5px;
    margin-bottom: 26px;
  }

  .back-cta {
    font-size: 13px;
    color: #0071e3;
    letter-spacing: 2px;
    font-weight: 500;
  }

  /* 品牌标识 */
  .back-brand {
    position: absolute;
    bottom: 12px;
    right: 16px;
    font-size: 8px;
    color: #d2d2d7;
    letter-spacing: 1.5px;
    text-transform: uppercase;
  }

  /* ========== 打印 ========== */
  @media print {
    body { background: none; padding: 0; gap: 0; }
    .gift-card { box-shadow: none; }
    .no-print { display: none !important; }
  }
</style>
</head>
